# Netlify configuration
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "public"
  command = "echo 'no build step needed'"

# Edge function intercepts all paths
[[edge_functions]]
  function = "track"
  path = "/*"

# After deploy, configure environment variables in Site Settings → Environment Variables.
# Defaults baked into the code:
#   BACKEND_HOST       default cf-track.laifa.xin
#   BACKEND_PROTOCOL   default http:
#   REDIRECT_TARGET    default https://www.google.com
